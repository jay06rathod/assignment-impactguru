<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprint store - cart</title>
    <link rel="stylesheet" href="./css/style.css">
    <!-- Adding cdn links for icons and fonts -->
    <link href="
    https://cdn.jsdelivr.net/npm/phosphor-icons@1.4.2/src/css/icons.min.css
    " rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
        <!-- Navbar -->
    <nav class="navbar">
        <!-- Logo of sprint with a paw icon -->
        <a href="/cart.html" class="logo"><i class="fa-solid fa-paw"></i></i>Sprint</a href="/">
        
        <!-- Search bar with icon and search input -->
        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input id="search-input" type="search" placeholder="Search products">
        </div>
        <!-- Cart button -->
        <button class="cart-btn"><i class="fa-solid fa-bag-shopping"></i></button>
        <button class="cart-btn"><i class="fa-solid fa-user-circle"></i></i></button>
        
        <!-- Contact redirect anchor tag -->
        <a href="contact.html" class="contact">Contact us</a>
    </nav>
    <hr>

    <main>
        <h1 class="heading">Cart</h1>
        <div class="cart-container">
            <table style="width: 100%;">
                <tr>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Total</th>
                </tr>
                <tr>
                    <td>
                        <img src="https://placehold.co/400" alt="placeholder">
                        <span>Lorem ipsum dolor sit amet.</span>
                    </td>
                    <td>
                        <input style="width: fit-content;" type="number" id="quantity" name="quantity" value="1">
                    </td>
                    <td>
                        $170
                    </td>
                </tr>
            </table>
        </div>
    </main>
    
</body>
</html>
